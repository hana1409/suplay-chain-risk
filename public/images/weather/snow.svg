<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <defs>
    <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <!-- Cloud -->
  <ellipse cx="32" cy="28" rx="20" ry="11" fill="#78818C" opacity="0.85"/>
  <ellipse cx="22" cy="25" rx="11" ry="9" fill="#6B7280"/>
  <ellipse cx="40" cy="24" rx="10" ry="8" fill="#6B7280"/>
  <ellipse cx="32" cy="24" rx="14" ry="8" fill="#9CA3AF"/>
  <!-- Snowflakes -->
  <g filter="url(#glow)" stroke="#BAE6FD" stroke-width="2" stroke-linecap="round" opacity="0.95">
    <!-- Flake 1 -->
    <line x1="22" y1="39" x2="22" y2="51"/><line x1="16" y1="45" x2="28" y2="45"/>
    <line x1="18" y1="41" x2="26" y2="49"/><line x1="26" y1="41" x2="18" y2="49"/>
    <!-- Flake 2 -->
    <line x1="42" y1="39" x2="42" y2="51"/><line x1="36" y1="45" x2="48" y2="45"/>
    <line x1="38" y1="41" x2="46" y2="49"/><line x1="46" y1="41" x2="38" y2="49"/>
  </g>
  <!-- Small dots -->
  <circle cx="32" cy="45" r="2" fill="#BAE6FD" opacity="0.8"/>
</svg>
