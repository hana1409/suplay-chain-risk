<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="40" height="40">
  <defs>
    <radialGradient id="portBg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1E40AF"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </radialGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000066"/></filter>
  </defs>
  <!-- Circle background -->
  <circle cx="32" cy="32" r="29" fill="url(#portBg)" filter="url(#shadow)" opacity="0.95"/>
  <circle cx="32" cy="32" r="29" fill="none" stroke="#60A5FA" stroke-width="1.5" opacity="0.6"/>
  <!-- Anchor shape -->
  <g fill="none" stroke="#E0F2FE" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
    <!-- Ring at top -->
    <circle cx="32" cy="17" r="5"/>
    <!-- Vertical shaft -->
    <line x1="32" y1="22" x2="32" y2="50"/>
    <!-- Cross bar -->
    <line x1="20" y1="28" x2="44" y2="28"/>
    <!-- Anchor flukes -->
    <path d="M20 50 Q14 43 20 40"/>
    <path d="M44 50 Q50 43 44 40"/>
    <!-- Curved bottom -->
    <path d="M20 50 Q32 57 44 50"/>
  </g>
</svg>
