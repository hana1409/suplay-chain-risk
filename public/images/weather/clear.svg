<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="48" height="48">
  <!-- Outer glow -->
  <defs>
    <radialGradient id="sunGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FFD700" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#FF8C00" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <circle cx="32" cy="32" r="30" fill="url(#sunGlow)"/>
  <!-- Sun rays -->
  <g filter="url(#glow)" stroke="#FFD700" stroke-width="3" stroke-linecap="round">
    <line x1="32" y1="6" x2="32" y2="13"/>
    <line x1="32" y1="51" x2="32" y2="58"/>
    <line x1="6" y1="32" x2="13" y2="32"/>
    <line x1="51" y1="32" x2="58" y2="32"/>
    <line x1="13" y1="13" x2="18" y2="18"/>
    <line x1="46" y1="46" x2="51" y2="51"/>
    <line x1="51" y1="13" x2="46" y2="18"/>
    <line x1="13" y1="51" x2="18" y2="46"/>
  </g>
  <!-- Sun core -->
  <circle cx="32" cy="32" r="13" fill="#FFD700" filter="url(#glow)"/>
  <circle cx="32" cy="32" r="11" fill="#FFF176"/>
</svg>
